<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WoofMeet Users</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: white;
      font-family: -apple-system, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }
    .emoji { font-size: 48px; margin-bottom: 16px; }
    .number { font-size: 220px; font-weight: 800; line-height: 1; color: #FF6B35; }
    .label { font-size: 22px; color: #888; margin-top: 16px; letter-spacing: 2px; text-transform: uppercase; }
    .updated { font-size: 13px; color: #444; margin-top: 20px; }
    .logo { margin-top: 60px; display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .logo img { width: 140px; height: 140px; border-radius: 32px; }
    .logo-name { font-size: 28px; font-weight: 700; color: #555; letter-spacing: 1px; }
  </style>
</head>
<body>
  <div class="number" id="count">—</div>
  <div class="label">Users</div>
  <div class="updated" id="updated"></div>
  <div class="logo">
    <img src="icon.png" alt="WoofMeet">
    <div class="logo-name">WoofMeet</div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
    import { getFirestore, doc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

    const app = initializeApp({
      apiKey: "AIzaSyBTiGo2n9laBh4JzWGYCrjMLZ8KhqUJoWU",
      authDomain: "pawmates-be0e1.firebaseapp.com",
      projectId: "pawmates-be0e1",
    });

    const db = getFirestore(app);

    onSnapshot(doc(db, 'starts', 'public'), (snap) => {
      const data = snap.data();
      const el = document.getElementById('count');
      el.textContent = data?.userCount ?? '?';
      document.getElementById('updated').textContent = 'Live · updated just now';
    }, (err) => {
      document.getElementById('count').textContent = '?';
      document.getElementById('updated').textContent = 'Could not load — ' + err.message;
    });
  </script>
</body>
</html>
